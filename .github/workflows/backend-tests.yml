name: Backend CI Tests

on:
  push:
    branches: [ "main", "Testing", "development" ]
  pull_request:
    branches: [ "main", "Testing", "development" ]

jobs:
  test:
    name: Run Integration Tests
    runs-on: ubuntu-latest

    # Set up a PostgreSQL service container for the tests
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run Jest Tests
        env:
          NODE_ENV: test
          DATABASE_URL: postgres://postgres:password@localhost:5432/postgres
          JWT_SECRET: super_secret_test_key_that_is_64_bytes_long_for_security_reasons
          JWT_REFRESH_SECRET: super_secret_refresh_key_that_is_64_bytes_long_for_security
          OTP_TEST_MODE: true
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY:    ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
          RAZORPAY_WEBHOOK_SECRET: ${{ secrets.RAZORPAY_WEBHOOK_SECRET }}
        run: npm test
